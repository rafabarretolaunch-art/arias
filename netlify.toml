[build]
  command = "npm ci && npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# El service worker debe revalidarse en cada deploy para que los móviles reciban la nueva versión.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache"
