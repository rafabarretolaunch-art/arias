<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>ari — tus aventuras</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111118">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ari">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face { font-family:'MonaSans'; src:url('fonts/MonaSans-Regular.ttf'); font-weight:400; font-display:swap }
    @font-face { font-family:'MonaSans'; src:url('fonts/MonaSans-Medium.ttf'); font-weight:500; font-display:swap }
    @font-face { font-family:'MonaSans'; src:url('fonts/MonaSans-SemiBold.ttf'); font-weight:600; font-display:swap }
    @font-face { font-family:'MonaSans'; src:url('fonts/MonaSans_SemiExpanded-SemiBold.ttf'); font-weight:700; font-display:swap }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
    html,body { height:100% }
    body {
      font-family:'MonaSans','Helvetica Neue',sans-serif;
      background:#0a0a0f;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
      color:#111118;
    }
    #root { height:100%; display:flex; justify-content:center; }

    /* cada pantalla ocupa la altura completa; centrada y limitada en desktop */
    .ari-screen {
      width:100%;
      max-width:480px;
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
      margin:0 auto;
    }
    @media (min-width:520px){
      #root { align-items:center; }
      .ari-screen {
        height:min(880px, 96dvh);
        border-radius:28px;
        box-shadow:0 20px 60px rgba(0,0,0,0.5);
        overflow:hidden;
      }
    }

    /* scrollbars discretos */
    .ari-screen ::-webkit-scrollbar { width:0; height:0; }
    button { font-family:inherit; }
    textarea { font-family:inherit; }

    /* puntitos del splash */
    .ari-dot { animation:ariBounce 1.2s infinite ease-in-out; }
    @keyframes ariBounce { 0%,80%,100%{ transform:translateY(0); opacity:.5 } 40%{ transform:translateY(-7px); opacity:1 } }

    /* halo del nodo de hoy */
    .ari-pulse { animation:ariPulse 2.2s infinite ease-in-out; }
    @keyframes ariPulse { 0%,100%{ opacity:.35; transform:translate(-50%,-50%) scale(1) } 50%{ opacity:.85; transform:translate(-50%,-50%) scale(1.08) } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
